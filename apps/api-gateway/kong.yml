# ==============================================
# Global Plugins
# ==============================================
plugins:
  # Rate limiting
  - name: rate-limiting
    config:
      minute: 100
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  # CORS
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - https://gabonbiz.ga
        - https://www.gabonbiz.ga
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Request-ID
      exposed_headers:
        - X-Request-ID
      credentials: true
      max_age: 3600

  # Request size limiting
  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes

  # Request transformer — add tracking headers
  - name: request-transformer
    config:
      add:
        headers:
          - 'X-Gateway: kong'

  # Prometheus metrics
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      upstream_health_metrics: true
