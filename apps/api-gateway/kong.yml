# Kong API Gateway Configuration — GABON BIZ
# Declarative configuration for Kong 3.x

_format_version: '3.0'
_transform: true

services:
  # ==============================================
  # M1 — Guichet Unique Entrepreneur (port 3001)
  # ==============================================
  - name: entrepreneur-service
    url: http://entrepreneur:3001
    routes:
      - name: entrepreneur-route
        paths:
          - /api/v1/entrepreneur
        strip_path: true
        protocols:
          - http
          - https

  # ==============================================
  # M2 — Marchés Publics Numériques (port 3002)
  # ==============================================
